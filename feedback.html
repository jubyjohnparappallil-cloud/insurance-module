<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Feedback - Shanthi Wellness</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;background:#1a1a2e;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .container{width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .step{display:none;width:100%;max-width:800px;text-align:center}.step.active{display:flex;flex-direction:column;align-items:center}
    .logo{height:100px;margin-bottom:16px;border-radius:12px;background:#fff;padding:10px 20px}
    h1{font-size:36px;color:#fff;margin-bottom:8px;font-weight:800}
    .sub{font-size:18px;color:rgba(255,255,255,0.6);margin-bottom:40px}

    /* Big Smileys */
    .smileys{display:flex;gap:24px;justify-content:center;margin-bottom:30px}
    .smiley-btn{width:120px;height:120px;border-radius:50%;border:none;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    .smiley-btn:hover{transform:scale(1.15)}
    .smiley-btn:active{transform:scale(0.95)}
    .smiley-btn.selected{transform:scale(1.2);box-shadow:0 0 0 6px rgba(255,255,255,0.4),0 15px 40px rgba(0,0,0,0.4)}
    .smiley-btn svg{width:80px;height:80px}
    .smiley-label{color:rgba(255,255,255,0.7);font-size:14px;font-weight:600;margin-top:10px}

    .s-red{background:linear-gradient(135deg,#ff4444,#cc0000)}
    .s-orange{background:linear-gradient(135deg,#ff9800,#e65100)}
    .s-yellow{background:linear-gradient(135deg,#ffeb3b,#f9a825)}
    .s-lime{background:linear-gradient(135deg,#8bc34a,#558b2f)}
    .s-green{background:linear-gradient(135deg,#4caf50,#1b5e20)}

    /* Stars */
    .stars{display:flex;gap:12px;margin:20px 0 30px}
    .star-btn{font-size:60px;cursor:pointer;color:rgba(255,255,255,0.3);transition:all 0.2s;text-shadow:0 2px 10px rgba(0,0,0,0.3)}
    .star-btn:hover,.star-btn.lit{color:#ffc107;text-shadow:0 0 20px rgba(255,193,7,0.5)}

    /* Form */
    textarea{width:100%;max-width:500px;height:100px;border:none;border-radius:16px;padding:16px;font-size:16px;resize:none;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2);margin-bottom:16px}
    textarea::placeholder{color:rgba(255,255,255,0.4)}
    textarea:focus{outline:none;border-color:#4caf50}
    input[type=text]{width:100%;max-width:500px;height:50px;border:none;border-radius:14px;padding:0 18px;font-size:16px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2);margin-bottom:12px}
    input[type=text]::placeholder{color:rgba(255,255,255,0.4)}
    input[type=text]:focus{outline:none;border-color:#4caf50}

    .btn{padding:16px 40px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s;margin:8px}
    .btn-submit{background:linear-gradient(135deg,#4caf50,#1b5e20);color:#fff;box-shadow:0 6px 20px rgba(46,125,50,0.4)}
    .btn-submit:hover{transform:translateY(-3px)}
    .btn-wa{background:#25d366;color:#fff;display:inline-flex;align-items:center;gap:10px;font-size:16px;text-decoration:none;border-radius:14px;padding:14px 28px}
    .btn-mail{background:#4285f4;color:#fff;display:inline-flex;align-items:center;gap:10px;font-size:16px;text-decoration:none;border-radius:14px;padding:14px 28px}
    .btn-google{background:#fff;color:#333;display:inline-flex;align-items:center;gap:10px;font-size:16px;text-decoration:none;border-radius:14px;padding:14px 28px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}

    .thank-icon{font-size:100px;margin-bottom:20px}
    .links{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:20px}
  </style>
</head>
<body>
<div class="container">
  <!-- STEP 1: Smiley Rating -->
  <div class="step active" id="step1">
    <img src="logo.png" class="logo" alt="Shanthi Wellness">
    <h1>How was your experience?</h1>
    <div class="sub">Tap the face that matches how you feel</div>
    <div class="smileys">
      <div style="text-align:center">
        <button class="smiley-btn s-red" onclick="pickSmiley(1,this)">
          <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none"/><circle cx="35" cy="40" r="6" fill="#fff"/><circle cx="65" cy="40" r="6" fill="#fff"/><path d="M30 70 Q50 55 70 70" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <div class="smiley-label">Terrible</div>
      </div>
      <div style="text-align:center">
        <button class="smiley-btn s-orange" onclick="pickSmiley(2,this)">
          <svg viewBox="0 0 100 100"><circle cx="35" cy="40" r="6" fill="#fff"/><circle cx="65" cy="40" r="6" fill="#fff"/><path d="M30 68 Q50 60 70 68" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <div class="smiley-label">Bad</div>
      </div>
      <div style="text-align:center">
        <button class="smiley-btn s-yellow" onclick="pickSmiley(3,this)">
          <svg viewBox="0 0 100 100"><circle cx="35" cy="40" r="6" fill="#333"/><circle cx="65" cy="40" r="6" fill="#333"/><line x1="32" y1="65" x2="68" y2="65" stroke="#333" stroke-width="5" stroke-linecap="round"/></svg>
        </button>
        <div class="smiley-label">Okay</div>
      </div>
      <div style="text-align:center">
        <button class="smiley-btn s-lime" onclick="pickSmiley(4,this)">
          <svg viewBox="0 0 100 100"><circle cx="35" cy="40" r="6" fill="#fff"/><circle cx="65" cy="40" r="6" fill="#fff"/><path d="M30 60 Q50 75 70 60" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <div class="smiley-label">Good</div>
      </div>
      <div style="text-align:center">
        <button class="smiley-btn s-green" onclick="pickSmiley(5,this)">
          <svg viewBox="0 0 100 100"><circle cx="35" cy="38" r="6" fill="#fff"/><circle cx="65" cy="38" r="6" fill="#fff"/><path d="M28 58 Q50 80 72 58" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <div class="smiley-label">Amazing!</div>
      </div>
    </div>
  </div>
  <!-- STEP 2: Star Rating -->
  <div class="step" id="step2">
    <h1>Rate your Doctor / Therapist</h1>
    <div class="sub">How would you rate the treatment?</div>
    <div class="stars">
      <span class="star-btn" onclick="pickStar(1)">★</span>
      <span class="star-btn" onclick="pickStar(2)">★</span>
      <span class="star-btn" onclick="pickStar(3)">★</span>
      <span class="star-btn" onclick="pickStar(4)">★</span>
      <span class="star-btn" onclick="pickStar(5)">★</span>
    </div>
    <button class="btn btn-submit" onclick="goStep(3)">Next →</button>
  </div>

  <!-- STEP 3: Comment + Contact -->
  <div class="step" id="step3">
    <h1>Tell us more</h1>
    <div class="sub">Your comments help us improve</div>
    <textarea id="fbComment" placeholder="Share your experience... (optional)"></textarea>
    <input type="text" id="fbName" placeholder="Your name">
    <input type="text" id="fbPhone" placeholder="Phone / WhatsApp number">
    <input type="text" id="fbEmail" placeholder="Email (optional)">
    <button class="btn btn-submit" onclick="submitFeedback()">Submit Feedback ✓</button>
  </div>

  <!-- STEP 4: Thank You -->
  <div class="step" id="step4">
    <div id="thankContent"></div>
  </div>
</div>

<script>
  var fb = {smiley:0, stars:0, comment:'', name:'', phone:'', email:''};

  function pickSmiley(n, el) {
    fb.smiley = n;
    document.querySelectorAll('.smiley-btn').forEach(s=>s.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(()=>goStep(2), 600);
  }

  function pickStar(n) {
    fb.stars = n;
    document.querySelectorAll('.star-btn').forEach((s,i)=>s.classList.toggle('lit',i<n));
  }

  function goStep(n) {
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step'+n).classList.add('active');
  }

  function submitFeedback() {
    fb.comment = document.getElementById('fbComment').value;
    fb.name = document.getElementById('fbName').value;
    fb.phone = document.getElementById('fbPhone').value;
    fb.email = document.getElementById('fbEmail').value;
    fb.overall = Math.round((fb.smiley + fb.stars) / 2);
    fb.date = new Date().toISOString();

    // Save to server
    fetch('/api/feedback', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(fb)}).catch(()=>{});

    // Show thank you with appropriate options
    var html = '';
    if (fb.overall >= 4) {
      html = '<div class="thank-icon">🎉</div>' +
        '<h1 style="color:#4caf50">Thank You!</h1>' +
        '<div class="sub">We\'re thrilled you had a great experience!</div>' +
        '<p style="color:rgba(255,255,255,0.7);font-size:16px;margin-bottom:20px">Would you mind sharing your experience?</p>' +
        '<div class="links">' +
          '<a href="https://g.page/r/shanthi-wellness/review" target="_blank" class="btn-google">⭐ Google Review</a>' +
          '<a href="https://wa.me/97142255133?text='+encodeURIComponent('I had a great experience at Shanthi Wellness! '+fb.comment)+'" target="_blank" class="btn-wa">💬 WhatsApp</a>' +
          '<a href="mailto:info@shanthiwellness.com?subject=Patient Feedback&body='+encodeURIComponent('Rating: '+fb.overall+'/5\n'+fb.comment)+'" class="btn-mail">📧 Email</a>' +
        '</div>' +
        '<button class="btn btn-submit" style="margin-top:30px" onclick="resetAll()">Done ✓</button>';
    } else if (fb.overall <= 2) {
      html = '<div class="thank-icon">🙏</div>' +
        '<h1 style="color:#ff9800">We\'re Sorry</h1>' +
        '<div class="sub">We apologize for the inconvenience.<br>Our team will contact you to make things right.</div>' +
        '<div class="links">' +
          '<a href="https://wa.me/97142255133?text='+encodeURIComponent('I would like to share feedback about my visit to Shanthi Wellness. '+fb.comment)+'" target="_blank" class="btn-wa">💬 Contact via WhatsApp</a>' +
          '<a href="tel:+97142255133" class="btn-mail" style="background:#4caf50">📞 Call Us</a>' +
        '</div>' +
        '<button class="btn btn-submit" style="margin-top:30px" onclick="resetAll()">Done</button>';
    } else {
      html = '<div class="thank-icon">😊</div>' +
        '<h1 style="color:#4caf50">Thank You!</h1>' +
        '<div class="sub">We appreciate your feedback and will keep improving.</div>' +
        '<div class="links">' +
          '<a href="https://wa.me/97142255133" target="_blank" class="btn-wa">💬 WhatsApp Us</a>' +
        '</div>' +
        '<button class="btn btn-submit" style="margin-top:30px" onclick="resetAll()">Done</button>';
    }
    document.getElementById('thankContent').innerHTML = html;
    goStep(4);
  }

  function resetAll() {
    fb = {smiley:0, stars:0, comment:'', name:'', phone:'', email:''};
    document.querySelectorAll('.smiley-btn').forEach(s=>s.classList.remove('selected'));
    document.querySelectorAll('.star-btn').forEach(s=>s.classList.remove('lit'));
    document.getElementById('fbComment').value='';
    document.getElementById('fbName').value='';
    document.getElementById('fbPhone').value='';
    document.getElementById('fbEmail').value='';
    goStep(1);
  }
</script>
</body>
</html>
