<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Shanthi Wellness</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;background:linear-gradient(160deg,#0d3d0d,#1a6b1a,#2e7d32);display:flex;align-items:center;justify-content:center}
    .login-box{background:#fff;border-radius:20px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
    .login-box img{height:90px;margin-bottom:12px}
    .login-box h2{color:#2e7d32;font-size:20px;margin-bottom:6px}
    .login-box p{color:#888;font-size:12px;margin-bottom:24px}
    .field{margin-bottom:16px;text-align:left}
    .field label{display:block;font-size:11px;font-weight:700;color:#333;margin-bottom:5px}
    .field input{width:100%;height:44px;border:2px solid #e0e0e0;border-radius:10px;padding:0 14px;font-size:14px;transition:border 0.2s}
    .field input:focus{outline:none;border-color:#4caf50}
    .login-btn{width:100%;height:48px;background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(46,125,50,0.3);transition:all 0.2s;margin-top:8px}
    .login-btn:hover{background:linear-gradient(135deg,#2e7d32,#1b5e20);transform:translateY(-1px)}
    .error{color:#c62828;font-size:12px;margin-top:10px;display:none}
    .system-select{margin-bottom:20px;text-align:left}
    .system-select label{display:block;font-size:11px;font-weight:700;color:#333;margin-bottom:5px}
    .system-select select{width:100%;height:42px;border:2px solid #e0e0e0;border-radius:10px;padding:0 12px;font-size:13px;color:#333}
  </style>
</head>
<body>
  <div class="login-box">
    <img src="logo.png" alt="Shanthi Wellness">
    <h2>Welcome Back</h2>
    <p>Sign in to access the system</p>

    <div class="system-select">
      <label>Select System</label>
      <select id="systemSelect">
        <option value="insurance">🏥 Insurance System</option>
        <option value="usermanagement">👤 User Management</option>
        <option value="staff">📋 Staff Portal</option>
      </select>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="error" id="error">Invalid username or password</div>
  </div>

  <script>
    document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});

    function doLogin(){
      var user = document.getElementById('username').value.trim().toLowerCase();
      var pass = document.getElementById('password').value;
      var system = document.getElementById('systemSelect').value;

      fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:user, password:pass})
      }).then(r=>r.json()).then(d=>{
        if(d.success){
          localStorage.setItem('emr_token', d.token);
          localStorage.setItem('emr_user', JSON.stringify(d.user));
          if(system==='insurance') window.location.href='/insurance';
          else if(system==='usermanagement') window.location.href='/usermanagement';
          else window.location.href='/staff';
        } else {
          document.getElementById('error').style.display='block';
          document.getElementById('error').textContent = d.error || 'Invalid username or password';
        }
      }).catch(()=>{
        document.getElementById('error').style.display='block';
      });
    }
  </script>
</body>
</html>
